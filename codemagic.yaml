workflows:
  ios-sidestore-ipa:
    name: iOS SideStore IPA Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      vars:
        XCODE_WORKSPACE: "YourApp.xcworkspace" # Change to your .xcworkspace name
        XCODE_SCHEME: "YourScheme"             # Change to your Xcode scheme name
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - target: main
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          pod install
      - name: Compile Unsigned Binary for SideStore
        script: |
          # Forces iOS compilation, disables signatures, and strips bitcode for SideStore compatibility
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO \
            clean build
      - name: Package into SideStore IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          
          # Locates the built .app package
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Built app binary not found!"
            exit 1
          fi
          
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          
          # Zips into a clean, SideStore-ready .ipa file
          cd build/ios/ipa
          zip -qy1r SideStore_App.ipa Payload
          rm -rf Payload
    artifacts:
      - build/ios/ipa/*.ipa