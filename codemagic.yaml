workflows:
  nightly-build-ios:
    name: Nightly Build iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: .
    environment:
      xcode: latest
      vars:
        GITHUB_TOKEN: $GITHUB_TOKEN

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:
      - name: Clean and Setup Local Folders
        script: |
          set -euo pipefail
          rm -rf FILES/output FILES/rahhh_SideStore.ipa FILES/rahhh_SideStore.ipa.sha256 rahhh_SideStore.ipa rahhh_SideStore.ipa.sha256
          mkdir -p FILES/output/Payload/rahhh.app

      - name: Compile and Package Unsigned SwiftUI App
        script: |
          set -euo pipefail
          chmod +x FILES/build_ipa.sh
          bash FILES/build_ipa.sh

      - name: Verify artifact presence
        script: |
          set -euo pipefail
          echo "PWD: $(pwd)"
          echo "Listing repo root contents:"
          ls -la || true
          echo "Listing FILES folder contents:"
          ls -la FILES || true
          echo "Listing output folder contents:"
          ls -la FILES/output || true
          [ -f rahhh_SideStore.ipa ] && echo "Found rahhh_SideStore.ipa at repo root"
          [ -f rahhh_SideStore.ipa.sha256 ] && echo "Found rahhh_SideStore.ipa.sha256 at repo root"
          [ -f FILES/rahhh_SideStore.ipa ] && echo "Found FILES/rahhh_SideStore.ipa"
          [ -f FILES/rahhh_SideStore.ipa.sha256 ] && echo "Found FILES/rahhh_SideStore.ipa.sha256"

      - name: Debug artifact globs
        script: |
          set -euo pipefail
          echo "Checking exact artifact glob matches"
          find . -name "*.ipa" -o -name "*.sha256" -print || true

      - name: Debug token
        script: |
          echo "Token length: ${#GITHUB_TOKEN}"

      - name: Publish nightly GitHub release and trigger dispatch
        script: |
          set -euo pipefail

          if [ -z "${GITHUB_TOKEN:-}" ]; then
            echo "GITHUB_TOKEN not set; cannot publish release"
            exit 1
          fi

          TAG_NAME="nightly-$(date +%Y%m%d%H%M%S)"
          REPO_API="https://api.github.com/repos/Neguy-spec/yes"

          IPA_FILE="rahhh_SideStore.ipa"
          SHA_FILE="rahhh_SideStore.ipa.sha256"

          if [ ! -f "$IPA_FILE" ]; then
            echo "IPA file missing: $IPA_FILE"
            exit 1
          fi

          if [ ! -f "$SHA_FILE" ]; then
            echo "SHA256 file missing: $SHA_FILE"
            exit 1
          fi

          USER_LOGIN=$(curl -sSL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/user | python3 -c "import sys,json;print(json.load(sys.stdin).get('login',''))")
          if [ -z "$USER_LOGIN" ]; then
            echo "Invalid or unauthorized GITHUB_TOKEN"
            exit 1
          fi

          CREATE_RESP=$(curl -sSL -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"tag_name\":\"$TAG_NAME\",\"name\":\"Nightly $TAG_NAME\",\"body\":\"Automated nightly build\",\"draft\":false,\"prerelease\":true}" \
            "$REPO_API/releases")

          UPLOAD_URL=$(echo "$CREATE_RESP" | python3 -c "import sys,json;print(json.load(sys.stdin).get('upload_url','').split('{')[0])")

          if [ -z "$UPLOAD_URL" ]; then
            echo "Failed to create release: $CREATE_RESP"
            exit 1
          fi

          curl -sSL -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @"$IPA_FILE" \
            "$UPLOAD_URL?name=$IPA_FILE"

          curl -sSL -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: text/plain" \
            --data-binary @"$SHA_FILE" \
            "$UPLOAD_URL?name=$SHA_FILE"

          curl -sSL -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"event_type\":\"codemagic-nightly\",\"client_payload\":{\"tag\":\"$TAG_NAME\"}}" \
            "$REPO_API/dispatches"

          echo "Nightly release published successfully."

    artifacts:
      - rahhh_SideStore.ipa
      - rahhh_SideStore.ipa.sha256
      - FILES/output/*.ipa
      - FILES/output/*.sha256
