workflows:
  nightly-build-ios:
    name: Nightly Build iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: .
    environment:
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:
      - name: Clean and Setup Local Folders
        script: |
          set -euo pipefail
          rm -rf FILES/output FILES/rahhh_SideStore.ipa FILES/rahhh_SideStore.ipa.sha256 rahhh_SideStore.ipa rahhh_SideStore.ipa.sha256
          mkdir -p FILES/output/Payload/rahhh.app

      - name: Compile and Package Unsigned SwiftUI App
        script: |
          set -euo pipefail
          chmod +x FILES/build_ipa.sh
          bash FILES/build_ipa.sh

      - name: Verify artifact presence
        script: |
          set -euo pipefail
          echo "PWD: $(pwd)"
          ls -la
          ls -la FILES || true
          ls -la FILES/output || true

    artifacts:
      - rahhh_SideStore.ipa
      - rahhh_SideStore.ipa.sha256
      - FILES/output/*.ipa
      - FILES/output/*.sha256
