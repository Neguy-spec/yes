workflows:
  ios-app-sidestore:
    name: Unsigned iOS SideStore Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    working_directory: FILES
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Clean and Setup Local Folders
        script: |
          rm -rf build output
          mkdir -p output/Payload/rahhh.app
      - name: Compile and Package Unsigned SwiftUI App
        script: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          FRAMEWORKS_PATH="$SDK_PATH/System/Library/Frameworks"
          
          # Compile Swift code directly into the local app folder bundle path
          swiftc -sdk "$SDK_PATH" \
                 -target arm64-apple-ios15.0 \
                 -F "$FRAMEWORKS_PATH" \
                 -parse-as-library \
                 -O -o output/Payload/rahhh.app/rahhh \
                 Sources/rahhh.swift
                 
          # Inject property metadata properties info
          cp Info.plist output/Payload/rahhh.app/Info.plist
          
          # Zip into an application installation layout archive file folder
          cd output
          zip -qy1r rahhh_SideStore.ipa Payload
      - name: Force Export to Global Root
        script: |
          # Copy the finished installation package directly out of subfolders into the main runner root folder path
          cp output/rahhh_SideStore.ipa ../
    artifacts:
      - "/*.ipa"
      - "*.ipa"
      - "*/.ipa"